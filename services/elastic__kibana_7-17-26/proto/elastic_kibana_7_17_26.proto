syntax = "proto3";

package Elastic_Kibana_7_17_26;

option go_package = "miner/grpc-service/Elastic_Kibana_7_17_26";

service Elastic_Kibana_7_17_26 {
  rpc CheckStatus(CheckStatusRequest) returns (KibanaHTTPResponse) {}
  rpc CallKibanaAPI(CallKibanaAPIRequest) returns (KibanaHTTPResponse) {}
  rpc FindSavedObjects(FindSavedObjectsRequest) returns (KibanaHTTPResponse) {}
  rpc ListDashboards(ListDashboardsRequest) returns (KibanaHTTPResponse) {}
  rpc FindRules(FindRulesRequest) returns (KibanaHTTPResponse) {}
}

message CheckStatusRequest {}

message CallKibanaAPIRequest {
  string method = 1;
  string path = 2;
  map<string, string> query = 3;
  string body = 4;
  map<string, string> headers = 5;
  string space_id = 6;
}

message FindSavedObjectsRequest {
  string type = 1;
  string search = 2;
  int32 page = 3;
  int32 per_page = 4;
  string space_id = 5;
}

message ListDashboardsRequest {
  string search = 1;
  int32 page = 2;
  int32 per_page = 3;
  string space_id = 4;
}

message FindRulesRequest {
  string search = 1;
  int32 page = 2;
  int32 per_page = 3;
  string space_id = 4;
}

message KibanaHTTPResponse {
  int32 http_status = 1;
  string http_body = 2;
  string response_headers_json = 3;
}
